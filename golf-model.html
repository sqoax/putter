<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTPiodfvBnqD6FVNZXYBsv4KGipr4KYiQA273S64Quj3a9s1_dLaAEma665pM4m-zPRKJzcpkmDDDbN/pub?output=csv';
const FIELD_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRNP6CpaVpPDMWb14vlaC8E47PGlgEZqbx6BAMsLUMXl6I9gvcP9BujsNf9FdIcSkEcs0DpGDe6J-6x/pub?output=csv';
const ODDS_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSgAmvqlMTbwU6-mTNiY70lgLl4L3w2RzgpRT_EpCBF_HNX0DcwKYY9GsY7AMYLfAW4sICbO4FZSdL9/pub?output=csv';
const RECENCY_DECAY = 0.90;
const EVENT_ORDER = ['Procore','Sanderson','Utah','RSM','Sony','Amex','Farmers','Waste','Pebble','Genesis','Cognizant'];

const COMPONENT_STATS = ['SG OTT','SG APP','SG ARG','SG PUTT','SCRAMBLING','GIR','D. DISTANCE','D. ACCURACY'];
const COMPOSITE_STATS = ['SG TOTAL','SG T2G','SG BS'];
const ALL_STAT_KEYS = [...COMPONENT_STATS, ...COMPOSITE_STATS];
const ALL_AVG_KEYS = [...ALL_STAT_KEYS];

const DISPLAY_COLS = ['SG OTT','SG APP','SG ARG','SG PUTT','SG T2G','SG BS','SCRAMBLING','GIR','D. DISTANCE','D. ACCURACY'];

const COURSE_PRESETS = [
  { name: 'Balanced', weights: { 'SG OTT':18,'SG APP':24,'SG ARG':10,'SG PUTT':12,'SCRAMBLING':8,'GIR':14,'D. DISTANCE':7,'D. ACCURACY':7,'SG TOTAL':0,'SG T2G':0,'SG BS':0 }},
  { name: 'Bomber Track', weights: { 'SG OTT':17,'SG APP':15,'SG ARG':4,'SG PUTT':9,'SCRAMBLING':3,'GIR':7,'D. DISTANCE':37,'D. ACCURACY':8,'SG TOTAL':0,'SG T2G':0,'SG BS':0 }},
  { name: 'Approach Heavy', weights: { 'SG OTT':12,'SG APP':32,'SG ARG':8,'SG PUTT':8,'SCRAMBLING':6,'GIR':22,'D. DISTANCE':4,'D. ACCURACY':8,'SG TOTAL':0,'SG T2G':0,'SG BS':0 }},
  { name: 'Putting Course', weights: { 'SG OTT':8,'SG APP':10,'SG ARG':6,'SG PUTT':38,'SCRAMBLING':6,'GIR':8,'D. DISTANCE':2,'D. ACCURACY':22,'SG TOTAL':0,'SG T2G':0,'SG BS':0 }},
  { name: 'Scrambler', weights: { 'SG OTT':9,'SG APP':15,'SG ARG':23,'SG PUTT':10,'SCRAMBLING':24,'GIR':6,'D. DISTANCE':2,'D. ACCURACY':11,'SG TOTAL':0,'SG T2G':0,'SG BS':0 }},
  { name: 'Accuracy Premium', weights: { 'SG OTT':12,'SG APP':22,'SG ARG':6,'SG PUTT':8,'SCRAMBLING':6,'GIR':12,'D. DISTANCE':2,'D. ACCURACY':32,'SG TOTAL':0,'SG T2G':0,'SG BS':0 }},
  { name: 'Par 5 Scorer', weights: { 'SG OTT':16,'SG APP':24,'SG ARG':4,'SG PUTT':6,'SCRAMBLING':3,'GIR':12,'D. DISTANCE':29,'D. ACCURACY':6,'SG TOTAL':0,'SG T2G':0,'SG BS':0 }},
];

let rawDB = {};       // all players regardless of min rounds
let allPlayers = [];  // filtered by minRounds
let thisWeekField = [];
let thisWeekTournament = '';
let fieldMode = 'all';  // 'all' | 'thisWeek' | 'custom'
let fieldPlayers = [];
let unmatched = [];
let customFieldText = '';
let minRounds = 8;
let activePreset = null;  // index into COURSE_PRESETS or null
let oddsLookup = {};  // lowercase "first last" -> fractional odds string
let oddsUnmatched = [];
let oddsSyncExpanded = false;
let globalNormStats = {};

let weights = {
  'SG OTT': 15, 'SG APP': 35, 'SG ARG': 20, 'SG PUTT': 20,
  'SCRAMBLING': 5, 'GIR': 5, 'D. DISTANCE': 0, 'D. ACCURACY': 0,
  'SG TOTAL': 0, 'SG T2G': 0, 'SG BS': 0
};

let presets = [];
let sortCol = 'composite';
let sortDir = 'desc';

/* ---- CSV ---- */
function splitCSV(line) {
  const r = []; let c = '', q = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (q) { if (ch === '"' && line[i+1] === '"') { c += '"'; i++; } else if (ch === '"') q = false; else c += ch; }
    else { if (ch === '"') q = true; else if (ch === ',') { r.push(c); c = ''; } else c += ch; }
  }
  r.push(c); return r;
}

function parseCSV(text) {
  const lines = text.split('\n');
  const headers = splitCSV(lines[0]).map(h => h.trim());
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const l = lines[i].trim(); if (!l) continue;
    const vals = splitCSV(l);
    const row = {};
    headers.forEach((h, idx) => { row[h] = (vals[idx] || '').trim(); });
    rows.push(row);
  }
  return rows;
}

function parseFieldCSV(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  if (!lines.length) return { names: [], tournamentName: '' };

  const firstRow = splitCSV(lines[0]);
  const firstCell = (firstRow[0] || '').trim().toLowerCase();
  const tournamentName = (firstRow[1] || '').trim();
  const startIdx = firstCell === 'player name' || firstCell === 'player' ? 1 : 0;

  const names = lines
    .slice(startIdx)
    .map(line => (splitCSV(line)[0] || '').trim())
    .filter(Boolean);

  return { names, tournamentName };
}

function eventIndex(name) {
  if (!name) return -1;
  const lower = name.toLowerCase();
  const idx = EVENT_ORDER.findIndex(e => lower.includes(e.toLowerCase()));
  return idx;
}

function buildEventWeights(rows) {
  const eventToIdx = {};
  let maxKnown = -1;

  for (const row of rows) {
    const eventName = (row['EVENT'] || '').trim();
    if (!eventName || eventToIdx[eventName] !== undefined) continue;
    const idx = eventIndex(eventName);
    eventToIdx[eventName] = idx;
    if (idx > maxKnown) maxKnown = idx;
  }

  if (maxKnown < 0) maxKnown = 0;

  const weights = {};
  for (const [eventName, idx] of Object.entries(eventToIdx)) {
    // Unknown events are treated as current so new tournaments still get full recency weight.
    if (idx < 0) {
      weights[eventName] = 1;
      continue;
    }
    const t = Math.max(0, maxKnown - idx);
    weights[eventName] = Math.pow(RECENCY_DECAY, t);
  }
  return weights;
}

/* ---- Build DB ---- */
let csvRows = []; // keep raw rows for re-filtering

function buildRawDB(rows) {
  const eventWeights = buildEventWeights(rows);
  const tmp = {};
  for (const row of rows) {
    const name = row['PLAYER NAME'];
    if (!name) continue;
    if (!tmp[name]) tmp[name] = { rounds: 0, sums: {}, counts: {} };
    const eventName = (row['EVENT'] || '').trim();
    const w = eventWeights[eventName] || 1;
    const mc = row['MADE_CUT'];
    tmp[name].rounds += (mc === 'TRUE' || mc === '1' || mc === 'true') ? 4 : 2;
    for (const k of ALL_AVG_KEYS) {
      const v = parseFloat(row[k]);
      if (!isNaN(v)) {
        tmp[name].sums[k] = (tmp[name].sums[k] || 0) + (v * w);
        tmp[name].counts[k] = (tmp[name].counts[k] || 0) + w;
      }
    }
  }
  const out = {};
  for (const [name, d] of Object.entries(tmp)) {
    const avgs = {};
    for (const k of ALL_AVG_KEYS) {
      avgs[k] = d.counts[k] ? d.sums[k] / d.counts[k] : null;
    }
    out[name] = { rounds: d.rounds, avgs };
  }
  return out;
}

function filterByMinRounds() {
  allPlayers = Object.entries(rawDB)
    .filter(([, d]) => d.rounds >= minRounds)
    .map(([name, d]) => ({ name, ...d }));
  globalNormStats = buildNormStats(allPlayers);
}

/* ---- Composite scoring ---- */
function zScores(players, key) {
  const vals = players.map(p => p.avgs[key]).filter(v => v != null);
  if (vals.length < 2) return null;
  const mean = vals.reduce((a, b) => a + b, 0) / vals.length;
  const sd = Math.sqrt(vals.reduce((s, v) => s + (v - mean) ** 2, 0) / vals.length);
  return sd > 0 ? { mean, sd } : null;
}

function buildNormStats(players) {
  const normStats = {};
  for (const k of ALL_STAT_KEYS) normStats[k] = zScores(players, k);
  return normStats;
}

function getNormStatsForPlayers(players) {
  if (fieldMode === 'all') return globalNormStats;
  return buildNormStats(players);
}

function computeComposite(players, normStats) {
  const activeKeys = ALL_STAT_KEYS.filter(k => weights[k] > 0);
  const totalW = activeKeys.reduce((s, k) => s + weights[k], 0);
  if (totalW === 0) { players.forEach(p => p.composite = 0); return; }
  for (const p of players) {
    let score = 0;
    for (const k of activeKeys) {
      const w = weights[k] / totalW;
      const s = normStats[k];
      const raw = p.avgs[k];
      if (s && raw != null) score += ((raw - s.mean) / s.sd) * w;
    }
    p.composite = score;
  }
}

/* ---- Which players to show ---- */
function getDisplayPlayers() {
  if (fieldMode === 'thisWeek' || fieldMode === 'custom') return fieldPlayers;
  return allPlayers;
}

/* ---- Field matching (case-insensitive) ---- */
function matchFieldFromList(nameList) {
  const matched = [], um = [];
  const seen = new Set();
  // Build lowercase → actual key lookup
  const dbLookup = {};
  for (const key of Object.keys(rawDB)) dbLookup[key.toLowerCase()] = key;
  for (const name of nameList) {
    const n = name.trim();
    if (!n) continue;
    const nLower = n.toLowerCase();
    if (seen.has(nLower)) continue;
    seen.add(nLower);
    const dbKey = dbLookup[nLower];
    if (dbKey && rawDB[dbKey].rounds >= minRounds) matched.push({ name: dbKey, ...rawDB[dbKey] });
    else um.push(n);
  }
  return { matched, unmatched: um };
}

/* ---- Sorting ---- */
function sortPlayers(players) {
  const sorted = [...players];
  const dir = sortDir === 'asc' ? 1 : -1;

  sorted.sort((a, b) => {
    let va, vb;
    if (sortCol === 'composite') { va = a.composite; vb = b.composite; }
    else if (sortCol === 'name') { return dir * a.name.localeCompare(b.name); }
    else if (sortCol === 'rounds') { va = a.rounds; vb = b.rounds; }
    else { va = a.avgs[sortCol]; vb = b.avgs[sortCol]; }

    if (va == null && vb == null) return 0;
    if (va == null) return 1;
    if (vb == null) return -1;
    return dir * (va - vb);
  });
  return sorted;
}

/* ---- Formatting ---- */
function fmtSG(v) {
  if (v == null) return '<span class="neutral">&mdash;</span>';
  const n = v.toFixed(2);
  if (v > 0.005) return `<span class="positive">+${n}</span>`;
  if (v < -0.005) return `<span class="negative">${n}</span>`;
  return `<span class="neutral">${n}</span>`;
}
function fmtPct(v) {
  if (v == null) return '<span class="neutral">&mdash;</span>';
  return `<span class="neutral">${v.toFixed(1)}%</span>`;
}
function fmtDist(v) {
  if (v == null) return '<span class="neutral">&mdash;</span>';
  return `<span class="neutral">${v.toFixed(1)}</span>`;
}
function fmtCell(key, val) {
  if (key === 'SCRAMBLING' || key === 'GIR' || key === 'D. ACCURACY') return fmtPct(val);
  if (key === 'D. DISTANCE') return fmtDist(val);
  return fmtSG(val);
}
function fmtComposite(v) {
  const n = v.toFixed(3);
  if (v > 0.0005) return `<span class="positive">+${n}</span>`;
  if (v < -0.0005) return `<span class="negative">${n}</span>`;
  return `<span class="neutral">${n}</span>`;
}
function fmtRounds(r) {
  if (r >= 20) return `<span class="rnds-reliable">${r}</span>`;
  if (r >= 12) return `<span class="rnds-normal">${r}</span>`;
  return `<span class="rnds-thin">${r}</span>`;
}
function fmtOdds(dbName) {
  const odds = oddsLookup[dbName.toLowerCase()];
  if (!odds) return '<span class="neutral">&mdash;</span>';
  return `<span>${odds}</span>`;
}

/* ---- Column header helper ---- */
function thHTML(colKey, label) {
  const isActive = sortCol === colKey;
  const arrow = isActive ? (sortDir === 'asc' ? '&#9650;' : '&#9660;') : '';
  const playerCls = colKey === 'name' ? ' col-player' : '';
  return `<th class="${isActive ? 'sort-active' : ''}${playerCls}" data-sort="${colKey}">${label}${arrow ? `<span class="sort-arrow">${arrow}</span>` : ''}</th>`;
}

/* ==== RENDER ==== */
function render() {
  const displayPlayers = getDisplayPlayers();
  const normStats = getNormStatsForPlayers(displayPlayers);
  computeComposite(displayPlayers, normStats);
  const sorted = sortPlayers(displayPlayers);
  const compositeLabel = fieldMode === 'all'
    ? 'Composite'
    : 'Composite<span class="th-note">vs. this field</span>';

  const totalW = ALL_STAT_KEYS.reduce((s, k) => s + weights[k], 0);
  const totalOk = Math.abs(totalW - 100) < 0.5;
  const oddsScopePlayers = (fieldMode === 'thisWeek' || fieldMode === 'custom')
    ? fieldPlayers.map(p => p.name)
    : Object.keys(rawDB);
  const oddsMissing = oddsScopePlayers.filter(name => !oddsLookup[name.toLowerCase()]);
  const oddsMatchedCount = Math.max(0, oddsScopePlayers.length - oddsMissing.length);
  const oddsStatusHTML = oddsMissing.length > 0
    ? `<span class="odds-sync-status warn">&#9888; ${oddsMissing.length} unmatched</span>`
    : `<span class="odds-sync-status good">&#10003; ${oddsMatchedCount} matched</span>`;

  /* ---- Left: Field panel ---- */
  let fieldStatusHTML = '';
  if (fieldMode === 'thisWeek' || fieldMode === 'custom') {
    const tournamentHTML = (fieldMode === 'thisWeek' && thisWeekTournament)
      ? `<div class="field-tournament"><span class="label">Tournament:</span>${thisWeekTournament}</div>`
      : '';
    fieldStatusHTML = `
      ${tournamentHTML}
      <div class="match-info">
        <span class="good">${fieldPlayers.length} matched</span>
        ${unmatched.length > 0 ? `<span class="bad">${unmatched.length} unmatched</span>` : ''}
      </div>
      ${unmatched.length > 0 ? `<div class="unmatched-box">${unmatched.join('<br>')}</div>` : ''}`;
  }

  let customFieldHTML = '';
  if (fieldMode === 'custom') {
    customFieldHTML = `
      <textarea id="fieldInput" placeholder="Paste player names, one per line&#10;e.g. SCHEFFLER SCOTTIE">${customFieldText}</textarea>
      <div class="field-btns">
        <button class="field-btn" id="loadCustomBtn">Load Custom Field</button>
      </div>`;
  }

  let leftHTML = `
    <div class="panel" style="margin-bottom:16px;">
      <div class="panel-head">
        Field Selection
        ${fieldMode === 'all'
          ? '<span class="field-mode-badge all">All Players</span>'
          : '<span class="field-mode-badge filtered">Filtered</span>'}
      </div>
      <div class="panel-body">
        <div class="field-btn-group">
          <button class="field-toggle-btn${fieldMode === 'all' ? ' active' : ''}" id="btnAll">All Players</button>
          <button class="field-toggle-btn${fieldMode === 'thisWeek' ? ' active-green' : ''}" id="btnThisWeek">This Week</button>
          <button class="field-toggle-btn${fieldMode === 'custom' ? ' active' : ''}" id="btnCustom">Custom Field</button>
        </div>
        ${customFieldHTML}
        ${fieldStatusHTML}
      </div>
    </div>
  `;

  /* ---- Left: Settings panel (min rounds) ---- */
  leftHTML += `
    <div class="panel" style="margin-bottom:16px;">
      <div class="panel-head">Settings</div>
      <div class="panel-body">
        <div class="min-rounds-row">
          <label>Min Rounds</label>
          <input type="number" class="min-rounds-input" id="minRoundsInput" value="${minRounds}" min="1">
        </div>
      </div>
    </div>
  `;

  const missingFromSheetHTML = oddsMissing.length > 0
    ? `<div class="odds-sync-list">${oddsMissing.map(name => `<div class="odds-missing-name">${name}</div>`).join('')}</div>`
    : '<div class="odds-sync-empty">None</div>';
  const sheetNotInModelHTML = oddsUnmatched.length > 0
    ? `<div class="odds-sync-list">${oddsUnmatched.map(name => `<div class="odds-orphan-name">${name}</div>`).join('')}</div>`
    : '<div class="odds-sync-empty">None</div>';

  leftHTML += `
    <div class="panel" style="margin-bottom:16px;">
      <div class="panel-head odds-sync-head" id="oddsSyncHead">
        Odds Sync
        <span class="odds-sync-right">
          ${oddsStatusHTML}
          <span class="odds-sync-caret">${oddsSyncExpanded ? '&#9660;' : '&#9658;'}</span>
        </span>
      </div>
      ${oddsSyncExpanded ? `
        <div class="panel-body">
          <div class="odds-sync-section">
            <div class="odds-sync-label">Missing from sheet</div>
            ${missingFromSheetHTML}
          </div>
          <div class="odds-sync-section">
            <div class="odds-sync-label">Sheet not in model</div>
            ${sheetNotInModelHTML}
          </div>
        </div>
      ` : ''}
    </div>
  `;

  /* ---- Left: Weight inputs panel ---- */
  let coursePresetsHTML = '<div class="course-preset-bar">';
  COURSE_PRESETS.forEach((p, i) => {
    coursePresetsHTML += `<button class="course-preset-btn${activePreset === i ? ' active' : ''}" data-cidx="${i}">${p.name}</button>`;
  });
  coursePresetsHTML += '</div>';

  let weightsHTML = '';

  // Component stats
  for (const k of COMPONENT_STATS) {
    weightsHTML += `
      <div class="weight-row">
        <div class="weight-label">${k}</div>
        <div class="weight-input-wrap">
          <input type="number" class="weight-num" min="0" max="100" value="${weights[k]}" data-stat="${k}">
          <span class="weight-pct-sign">%</span>
        </div>
      </div>`;
  }

  // Divider warning
  weightsHTML += `<div class="group-divider">&#9888;&#65039; Mixing composite and component stats causes double counting.</div>`;

  // Composite stats
  for (const k of COMPOSITE_STATS) {
    weightsHTML += `
      <div class="weight-row">
        <div class="weight-label">${k}</div>
        <div class="weight-input-wrap">
          <input type="number" class="weight-num" min="0" max="100" value="${weights[k]}" data-stat="${k}">
          <span class="weight-pct-sign">%</span>
        </div>
      </div>`;
  }

  let presetsHTML = '';
  if (presets.length > 0) {
    presetsHTML = `<div class="preset-bar">${presets.map((p, i) =>
      `<span class="preset-chip" data-idx="${i}">${p.name}</span>`
    ).join('')}</div>`;
  }

  leftHTML += `
    <div class="panel">
      <div class="panel-head">Stat Weights</div>
      <div class="panel-body">
        ${coursePresetsHTML}
        ${weightsHTML}
        <div class="weight-total">
          <span>Total</span>
          <div>
            <span class="val ${totalOk ? 'ok' : 'warn'}">${Math.round(totalW)}%</span>
            ${!totalOk ? '<div class="weight-warning">Weights must sum to 100% for accurate scoring.</div>' : ''}
          </div>
        </div>
        <div class="save-row">
          <input type="text" id="presetName" placeholder="Preset name&hellip;">
          <button class="save-btn" id="savePresetBtn">Save</button>
        </div>
        ${presetsHTML}
      </div>
    </div>
  `;

  /* ---- Right: Rankings table ---- */
  let rightHTML = '';
  if (displayPlayers.length === 0) {
    rightHTML = `
      <div class="panel">
        <div class="panel-head">Rankings</div>
        <div class="empty-table">No qualifying players found</div>
      </div>`;
  } else {
    const rows = sorted.map((p, i) => `<tr>
      <td class="rank-cell">${i + 1}</td>
      <td class="col-player">${p.name}</td>
      <td>${fmtRounds(p.rounds)}</td>
      <td>${fmtComposite(p.composite)}</td>
      <td>${fmtOdds(p.name)}</td>
      ${DISPLAY_COLS.map(k => `<td>${fmtCell(k, p.avgs[k])}</td>`).join('')}
    </tr>`).join('');

    rightHTML = `
      <div class="panel">
        <div class="panel-head">Rankings<span style="font-weight:400;text-transform:none;letter-spacing:0">${sorted.length} players</span></div>
        <div class="table-wrap" style="max-height:calc(100vh - 140px);overflow-y:auto;">
          <table>
            <thead><tr>
              ${thHTML('rank', '#')}
              ${thHTML('name', 'Player')}
              ${thHTML('rounds', 'Rnds')}
              ${thHTML('composite', compositeLabel)}
              ${thHTML('odds', 'Odds (Frac)')}
              ${DISPLAY_COLS.map(k => thHTML(k, k)).join('')}
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  }

  document.getElementById('app').innerHTML = `
    <div class="shell">
      <div class="left-col">${leftHTML}</div>
      <div class="right-col">${rightHTML}</div>
    </div>
  `;

  bind();
}

/* ==== EVENT BINDING ==== */
function bind() {
  // Field mode buttons
  document.getElementById('btnAll').addEventListener('click', () => {
    fieldMode = 'all';
    fieldPlayers = [];
    unmatched = [];
    render();
  });

  document.getElementById('btnThisWeek').addEventListener('click', () => {
    fieldMode = 'thisWeek';
    const res = matchFieldFromList(thisWeekField);
    fieldPlayers = res.matched;
    unmatched = res.unmatched;
    render();
  });

  document.getElementById('btnCustom').addEventListener('click', () => {
    fieldMode = 'custom';
    fieldPlayers = [];
    unmatched = [];
    render();
  });

  const oddsSyncHead = document.getElementById('oddsSyncHead');
  if (oddsSyncHead) {
    oddsSyncHead.addEventListener('click', () => {
      oddsSyncExpanded = !oddsSyncExpanded;
      render();
    });
  }

  // Custom field load
  const loadCustomBtn = document.getElementById('loadCustomBtn');
  if (loadCustomBtn) {
    loadCustomBtn.addEventListener('click', () => {
      customFieldText = document.getElementById('fieldInput').value;
      if (!customFieldText.trim()) return;
      const lines = customFieldText.split('\n').map(l => l.trim()).filter(Boolean);
      const res = matchFieldFromList(lines);
      fieldPlayers = res.matched;
      unmatched = res.unmatched;
      render();
    });
  }

  // Min rounds
  const minRoundsInput = document.getElementById('minRoundsInput');
  const commitMinRounds = () => {
    let val = parseInt(minRoundsInput.value);
    if (isNaN(val) || val < 1) val = 1;
    minRounds = val;
    filterByMinRounds();
    // Re-match field if active
    if (fieldMode === 'thisWeek') {
      const res = matchFieldFromList(thisWeekField);
      fieldPlayers = res.matched;
      unmatched = res.unmatched;
    } else if (fieldMode === 'custom' && customFieldText.trim()) {
      const lines = customFieldText.split('\n').map(l => l.trim()).filter(Boolean);
      const res = matchFieldFromList(lines);
      fieldPlayers = res.matched;
      unmatched = res.unmatched;
    }
    render();
  };
  minRoundsInput.addEventListener('change', commitMinRounds);
  minRoundsInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); commitMinRounds(); }
  });

  // Course preset buttons
  document.querySelectorAll('.course-preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.cidx);
      activePreset = idx;
      weights = { ...COURSE_PRESETS[idx].weights };
      render();
    });
  });

  // Weight inputs — live update
  document.querySelectorAll('.weight-num').forEach(inp => {
    const update = () => {
      const stat = inp.dataset.stat;
      let val = parseInt(inp.value);
      if (isNaN(val)) val = 0;
      if (val < 0) val = 0;
      if (val > 100) val = 100;
      weights[stat] = val;
      // Deselect course preset on manual edit
      if (activePreset !== null) {
        activePreset = null;
        document.querySelectorAll('.course-preset-btn').forEach(b => b.classList.remove('active'));
      }
      updateTableAndTotal();
    };
    inp.addEventListener('input', update);
  });

  // Save preset
  document.getElementById('savePresetBtn').addEventListener('click', () => {
    const nameEl = document.getElementById('presetName');
    const name = nameEl.value.trim();
    if (!name) return;
    presets.push({ name, weights: { ...weights } });
    render();
  });

  // Load presets
  document.querySelectorAll('.preset-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const idx = parseInt(chip.dataset.idx);
      weights = { ...presets[idx].weights };
      render();
    });
  });

  // Sortable column headers
  document.querySelectorAll('thead th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.sort;
      if (col === 'rank') return; // rank is just a sequential number
      if (sortCol === col) {
        sortDir = sortDir === 'desc' ? 'asc' : 'desc';
      } else {
        sortCol = col;
        sortDir = (col === 'name') ? 'asc' : 'desc';
      }
      render();
    });
  });
}

/* ---- Update table + total without full re-render (keeps input focus) ---- */
function updateTableAndTotal() {
  // Update total display
  const totalW = ALL_STAT_KEYS.reduce((s, k) => s + weights[k], 0);
  const totalOk = Math.abs(totalW - 100) < 0.5;
  const totalValEl = document.querySelector('.weight-total .val');
  if (totalValEl) {
    totalValEl.textContent = Math.round(totalW) + '%';
    totalValEl.className = 'val ' + (totalOk ? 'ok' : 'warn');
  }
  const warningEl = document.querySelector('.weight-warning');
  if (!totalOk && !warningEl) {
    const totalDiv = document.querySelector('.weight-total > div');
    if (totalDiv) {
      const w = document.createElement('div');
      w.className = 'weight-warning';
      w.textContent = 'Weights must sum to 100% for accurate scoring.';
      totalDiv.appendChild(w);
    }
  } else if (totalOk && warningEl) {
    warningEl.remove();
  }

  // Re-compute and re-render rankings table
  const displayPlayers = getDisplayPlayers();
  const normStats = getNormStatsForPlayers(displayPlayers);
  computeComposite(displayPlayers, normStats);
  const sorted = sortPlayers(displayPlayers);

  const tbody = document.querySelector('.right-col tbody');
  if (tbody && sorted.length > 0) {
    tbody.innerHTML = sorted.map((p, i) => `<tr>
      <td class="rank-cell">${i + 1}</td>
      <td class="col-player">${p.name}</td>
      <td>${fmtRounds(p.rounds)}</td>
      <td>${fmtComposite(p.composite)}</td>
      <td>${fmtOdds(p.name)}</td>
      ${DISPLAY_COLS.map(k => `<td>${fmtCell(k, p.avgs[k])}</td>`).join('')}
    </tr>`).join('');
  }
}

/* ==== INIT ==== */
async function init() {
  try {
    const [statsRes, fieldRes, oddsRes] = await Promise.all([
      fetch(CSV_URL),
      fetch(FIELD_CSV_URL),
      fetch(ODDS_CSV_URL).catch(() => null)
    ]);
    if (!statsRes.ok) throw new Error(`Stats CSV HTTP ${statsRes.status}`);

    const statsText = await statsRes.text();
    csvRows = parseCSV(statsText);
    rawDB = buildRawDB(csvRows);

    if (fieldRes.ok) {
      const fieldText = await fieldRes.text();
      const parsedField = parseFieldCSV(fieldText);
      thisWeekField = parsedField.names;
      thisWeekTournament = parsedField.tournamentName;
    } else {
      thisWeekField = [];
      thisWeekTournament = '';
      console.warn(`Field CSV unavailable (HTTP ${fieldRes.status}).`);
    }

    // Build odds lookup from CSV — fail silently if anything goes wrong
    try {
      oddsLookup = {};
      if (oddsRes && oddsRes.ok) {
        const oddsText = await oddsRes.text();
        const lines = oddsText.split('\n');
        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed) continue;
          const cols = trimmed.split(',');
          const name = (cols[0] || '').trim();
          const fractionalOdds = (cols[1] || '').trim();
          if (!name || !fractionalOdds) continue;
          oddsLookup[name.toLowerCase()] = fractionalOdds;
        }
      }
    } catch (_) {
      oddsLookup = {};
    }
    const rawDbNameSet = new Set(Object.keys(rawDB).map(name => name.toLowerCase()));
    oddsUnmatched = Object.keys(oddsLookup).filter(name => !rawDbNameSet.has(name));

    filterByMinRounds();
    render();
  } catch (err) {
    document.getElementById('app').innerHTML =
      `<div style="max-width:1320px;margin:0 auto;padding:0 24px;"><div class="error-box">Failed to load data: ${err.message}</div></div>`;
  }
}

init();
</script>
